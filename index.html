<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kintu Peter | AI Systems Architect</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />

    <script>
      const localKnowledge = [
          {
              // Basic Greetings
              keywords: ["hello", "hi", "hey", "greetings", "morning", "evening"],
              response: "Hello! I am Peter's AI representative. How can I help you learn more about his work in AI and Systems Architecture?"
          },
          {
              // Broadened keywords for Peter's identity
              keywords: ["who is", "peter", "kintu", "about", "developer", "background", "who are you"],
              response: "Kintu Peter is a Senior AI Systems Architect and Founder specializing in LLM-powered agents, scalable intelligent platforms (like Nakintu AI), and digital infrastructure for the African economy."
          },
          {
              keywords: ["nakintu", "learnflow", "education", "tutor"],
              response: "Nakintu AI is Peter's specialized educational ecosystem. It features AI tutoring, automated report generation, and multilingual tools to make learning more accessible."
          },
          {
              keywords: ["africana", "ecommerce", "negotiation", "tiktok"],
              response: "Africana AI is an intelligent economic engine built by Peter that uses autonomous agents for real-time price negotiation and TikTok-to-AI shopping workflows."
          },
          {
              keywords: ["contact", "email", "whatsapp", "hire", "reach", "phone", "number", "message"],
              response: "You can reach Peter directly via WhatsApp at +256 789 746 493 or via email at kintupeter7@gmail.com."
          }
      ];

      function displayMessage(text, isUser = false) {
          const chatWindow = document.getElementById('chat-messages');
          const messageElement = document.createElement('div');
          messageElement.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
          messageElement.textContent = text;
          chatWindow.appendChild(messageElement);
          chatWindow.scrollTop = chatWindow.scrollHeight;
      }

      const handleChat = (query) => {
          const input = query.toLowerCase();
          let response = null;

          // Improved matching: Checks if the user's word is in our keyword list
          // OR if our keyword is inside the user's sentence.
          for (const item of localKnowledge) {
              const match = item.keywords.some(key => input.includes(key));
              if (match) {
                  response = item.response;
                  break;
              }
          }

          if (!response) {
              response = "I don't have a specific record for that. For detailed information, please contact Peter on WhatsApp at +256 789 746 493 or email kintupeter7@gmail.com.";
          }
          
          displayMessage(response, false);
      };

      window.onload = function() {
          const chatToggle = document.getElementById('chat-toggle');
          const chatContainer = document.getElementById('chat-container');
          const chatInput = document.getElementById('chat-input');
          const sendButton = document.getElementById('send-button');

          chatToggle.onclick = () => chatContainer.classList.toggle('open');

          const sendMessage = () => {
              const query = chatInput.value.trim();
              if (query) {
                  displayMessage(query, true);
                  chatInput.value = '';
                  setTimeout(() => handleChat(query), 200);
              }
          };

          sendButton.onclick = sendMessage;
          chatInput.onkeypress = (e) => e.key === 'Enter' && sendMessage();
      };
    </script>

    <style>
        :root {
            --bg: #050508;
            --card-bg: #0d0d12;
            --accent: #00d2ff;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --glass: rgba(255, 255, 255, 0.03);
        }
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; }
        
        /* Layout Styles */
        .navbar { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 1100px; padding: 12px 40px; background: rgba(13, 13, 18, 0.7); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 100px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .logo { font-size: 1.1rem; font-weight: 800; color: var(--text-main); text-decoration: none; }
        .logo span { color: var(--accent); }
        .nav-links { list-style: none; display: flex; gap: 30px; }
        .nav-links a { text-decoration: none; color: var(--text-dim); font-size: 0.85rem; font-weight: 600; }

        .hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 100px 10%; text-align: center; }
        h1 { font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 800; margin-bottom: 20px; }
        .gradient-text { background: linear-gradient(90deg, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Chat Styles */
        #chat-toggle { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--accent); border: none; border-radius: 50%; color: #000; font-size: 1.5rem; cursor: pointer; z-index: 3000; }
        #chat-container { position: fixed; bottom: 100px; right: 30px; width: 330px; height: 450px; background: var(--card-bg); border-radius: 20px; border: 1px solid var(--border); display: none; flex-direction: column; z-index: 2999; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        #chat-container.open { display: flex; }
        .chat-header { background: var(--accent); color: #000; padding: 12px; font-weight: 800; font-size: 0.7rem; text-align: center; text-transform: uppercase; }
        #chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 8px 12px; border-radius: 12px; font-size: 0.8rem; max-width: 85%; line-height: 1.4; }
        .bot-message { background: var(--glass); align-self: flex-start; color: var(--text-main); }
        .user-message { background: var(--accent); color: #000; align-self: flex-end; font-weight: 600; }
        .chat-input-container { padding: 12px; display: flex; gap: 8px; border-top: 1px solid var(--border); }
        #chat-input { flex: 1; background: transparent; border: 1px solid var(--border); border-radius: 8px; padding: 8px; color: #fff; outline: none; font-size: 0.8rem; }
        #send-button { background: var(--accent); border: none; border-radius: 8px; width: 35px; cursor: pointer; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="#" class="logo">KP<span>.ARCHITECT</span></a>
        <ul class="nav-links">
            <li><a href="#">Intelligence</a></li>
            <li><a href="#">Architecture</a></li>
            <li><a href="#">Ecosystems</a></li>
        </ul>
    </nav>

    <section class="hero">
        <div>
            <h1>Architecting <br><span class="gradient-text">Autonomous AI</span></h1>
            <p style="color:var(--text-dim); max-width:600px; margin: 0 auto;">Senior AI Architect & Founder of Nakintu AI. Engineering the future of intelligent agents.</p>
        </div>
    </section>

    <div id="chat-container">
        <div class="chat-header">System Core v3.0 - Local</div>
        <div id="chat-messages">
            <div class="message bot-message">System online. How can I help you today?</div>
        </div>
        <div class="chat-input-container">
            <input type="text" id="chat-input" placeholder="Type a message..." />
            <button id="send-button"><i class="bx bxs-send"></i></button>
        </div>
    </div>
    
    <button id="chat-toggle"><i class="bx bx-message-square-dots"></i></button>
</body>
</html>
